backend:
  name: git-gateway
  branch: main

# Audio is hosted on Cloudinary (dhjfb1hzx).
# To add a track: upload the file to Cloudinary Media Library,
# copy the delivery URL, and paste it into the "Audio File URL" field below.

collections:
  - name: "categories"
    label: "Categories"
    folder: "content/categories"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug (URL)", name: "slug", widget: "string", hint: "lowercase, hyphens only, e.g. music-production" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - label: "Tracks"
        name: "tracks"
        widget: "list"
        required: false
        fields:
          - { label: "Track Title", name: "title", widget: "string" }
          - { label: "Artist", name: "artist", widget: "string", default: "Ashna" }
          - { label: "Audio File URL", name: "file", widget: "string", hint: "Upload to Cloudinary, then paste the delivery URL here (e.g. https://res.cloudinary.com/dhjfb1hzx/video/upload/...)" }
